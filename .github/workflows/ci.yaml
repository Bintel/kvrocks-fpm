name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 2.**

env:
  DEB_FPM_OPTS: >-
    --config-files /etc/kvrocks/kvrocks.conf
  COMMON_FPM_OPTS: >-
    -s dir -n kvrocks --verbose -a native
    --description 'A distributed key value NoSQL database that uses RocksDB as storage engine and is compatible with Redis protocol'
    --url 'https://kvrocks.apache.org' --license 'Apache-2.0'

jobs:
  release-packages:
    name: Release DEB & RPM Package
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4.0.0
        with:
          fetch-depth: 64

      - name: Install Dependencies
        run: |
          sudo apt-get install -y git build-essential cmake libtool python3 libsystemd-dev

      - name: Set env variables
        run: |
          echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV
          echo "ITERATION=$(cat ITERATION)" >> $GITHUB_ENV

      - name: Build
        run: |
          git clone -b v$VERSION https://github.com/apache/kvrocks
          cd kvrocks
          ./x.py build -DPORTABLE=1 -DCMAKE_BUILD_TYPE=Release -j $(nproc)
      
      - name: Make DEB release directory
        run: |
          mkdir deb-release
          mkdir -p deb-release/usr/local/bin
          mkdir -p deb-release/etc/kvrocks
          mkdir -p deb-release/usr/share/licenses/kvrocks
          mkdir -p deb-release/lib/systemd/system
          cp kvrocks/build/kvrocks deb-release/usr/local/bin/
          cp kvrocks/build/kvrocks2redis deb-release/usr/local/bin/
          cp kvrocks/kvrocks.conf deb-release/etc/kvrocks/
          cp -r kvrocks/LICENSE kvrocks/NOTICE kvrocks/licenses deb-release/usr/share/licenses/kvrocks/
          cp kvrocks/utils/systemd/kvrocks.service deb-release/lib/systemd/system/

      - name: Package DEB
        uses: bpicode/github-action-fpm@v0.9.3
        with:
          fpm_args: '.'
          fpm_opts: '-t deb -v ${{ env.VERSION }} --iteration ${{ env.ITERATION }} -C deb-release ${{ env.COMMON_FPM_OPTS }} ${{ env.DEB_FPM_OPTS }}'
      
      - name: Make RPM release directory
        run: |
          mkdir rpm-release
          mkdir -p rpm-release/usr/local/bin
          mkdir -p rpm-release/etc/kvrocks
          mkdir -p rpm-release/usr/share/licenses/kvrocks
          mkdir -p rpm-release/lib/systemd/system
          cp kvrocks/build/kvrocks rpm-release/usr/local/bin/
          cp kvrocks/build/kvrocks2redis rpm-release/usr/local/bin/
          cp kvrocks/kvrocks.conf rpm-release/etc/kvrocks/
          cp -r kvrocks/LICENSE kvrocks/NOTICE kvrocks/licenses/* rpm-release/usr/share/licenses/kvrocks/
          cp kvrocks/utils/systemd/kvrocks.service rpm-release/lib/systemd/system/

      - name: Package RPM
        uses: bpicode/github-action-fpm@v0.9.3
        with:
          fpm_args: '.'
          fpm_opts: '-t rpm -v ${{ env.VERSION }} --iteration ${{ env.ITERATION }} -C rpm-release ${{ env.COMMON_FPM_OPTS }}'

      - name: Release
        uses: softprops/action-gh-release@v2.0.6
        with:
          name: |
            ${{ env.VERSION }}-${{ env.ITERATION }}
          files: |
            ./*.deb
            ./*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
